# Conda environment for the GBM target-discovery pipeline.
#   conda env create -f environment.yml
#   conda activate gbm-target-discovery
name: gbm-target-discovery
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - pandas>=2.0
  - numpy>=1.24
  - scipy>=1.10
  - statsmodels>=0.14
  - matplotlib>=3.7
  - pyarrow>=12.0
  - anndata>=0.9
  - pip
  - pip:
      # Live mode only (GBM_LIVE=1); not needed for cached reproduction.
      - anthropic>=0.39
